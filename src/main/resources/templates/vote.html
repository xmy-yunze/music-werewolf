<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗳️ 投票 - 音乐狼人杀</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { color: #fff; font-size: 22px; text-align: center; margin-bottom: 4px; }
        .subtitle { text-align: center; color: rgba(255,255,255,0.4); font-size: 13px; margin-bottom: 20px; }
        .player-option {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            border: 2px solid transparent;
        }
        .player-option.selected {
            background: rgba(108, 99, 255, 0.2);
            border-color: #6c63ff;
        }
        .player-option .avatar { font-size: 20px; margin-right: 14px; }
        .player-option .name { color: #fff; font-size: 16px; flex: 1; }
        .player-option .radio {
            width: 22px; height: 22px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .player-option.selected .radio { border-color: #6c63ff; background: #6c63ff; }
        .player-option.selected .radio::after { content: '✓'; color: #fff; font-size: 14px; }
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            margin-top: 12px;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: #6c63ff; color: #fff; }
        .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }
        .selected-name { text-align: center; color: rgba(255,255,255,0.3); font-size: 13px; margin-top: 12px; }
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #fff; padding: 12px 24px;
            border-radius: 12px; font-size: 14px; opacity: 0;
            transition: opacity 0.3s; pointer-events: none;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
<div class="container">
    <h1>🗳️ 投票</h1>
    <p class="subtitle">你觉得谁是卧底？</p>
    <div id="playerList"></div>
    <div class="selected-name" id="selectedDisplay">👆 请选择一位玩家</div>
    <button class="btn btn-primary" id="submitBtn" disabled onclick="submitVote()">确认投票</button>
</div>
<div class="toast" id="toast"></div>

<script>
    const pathParts = window.location.pathname.split('/');
    const roomId = pathParts[2];
    const playerName = decodeURIComponent(pathParts[3] || '');
    const API_BASE = 'http://localhost:8080/api/room';

    let selectedTarget = null;

    function showToast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 2500);
    }

    function loadPlayers() {
        fetch(API_BASE + '/info/' + roomId)
            .then(res => res.json())
            .then(data => {
                if (!data.success) { showToast('房间不存在'); return; }
                const players = data.data.players || [];
                const container = document.getElementById('playerList');
                container.innerHTML = players
                    .filter(p => p.name !== playerName)
                    .map(p => `
                        <div class="player-option" data-name="${p.name}" onclick="selectPlayer('${p.name}')">
                            <div class="avatar">👤</div>
                            <div class="name">${p.name}</div>
                            <div class="radio"></div>
                        </div>
                    `).join('') || '<div style="color:rgba(255,255,255,0.2);text-align:center;padding:20px;">没有其他玩家</div>';
            })
            .catch(() => showToast('服务器连接失败'));
    }

    function selectPlayer(name) {
        selectedTarget = name;
        document.querySelectorAll('.player-option').forEach(el => {
            el.classList.toggle('selected', el.dataset.name === name);
        });
        document.getElementById('selectedDisplay').textContent = '✅ 已选择：' + name;
        document.getElementById('submitBtn').disabled = false;
    }

    function submitVote() {
        if (!selectedTarget) { showToast('请先选择一位玩家'); return; }
        fetch(API_BASE + '/vote', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ roomId: roomId, voterName: playerName, targetName: selectedTarget })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                showToast('✅ 投票成功！');
                // 显示等待状态
                document.getElementById('playerList').innerHTML = '<div style="color:rgba(255,255,255,0.6);text-align:center;padding:40px;">⏳ 等待其他玩家投票...</div>';
                document.getElementById('selectedDisplay').textContent = '✅ 已投票：' + selectedTarget;
                document.getElementById('submitBtn').style.display = 'none';
                // 开始轮询投票进度
                pollVoteProgress();
            } else {
                showToast(data.message || '投票失败');
            }
        })
        .catch(() => showToast('服务器连接失败'));
    }
    function pollVoteProgress() {
        const interval = setInterval(() => {
            fetch(API_BASE + '/vote-progress/' + roomId)
                .then(res => res.json())
                .then(data => {
                    if (data.success && data.data.allVoted) {
                        clearInterval(interval);
                        window.location.href = '/result/' + roomId + '?playerName=' + encodeURIComponent(playerName);
                    }
                })
                .catch(() => {});
        }, 2000); // 每2秒轮询一次
    }
    loadPlayers();
</script>
</body>
</html>
