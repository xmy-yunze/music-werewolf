<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 音乐狼人杀</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            text-align: center;
            color: #fff;
            font-size: 28px;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            display: block;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            border-color: #6c63ff;
        }
        .form-group input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary {
            background: #6c63ff;
            color: #fff;
        }
        .btn-primary:hover { opacity: 0.9; }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            margin-top: 10px;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); }
        .divider {
            text-align: center;
            color: rgba(255,255,255,0.2);
            font-size: 12px;
            margin: 20px 0;
            position: relative;
        }
        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .join-row {
            display: flex;
            gap: 10px;
        }
        .join-row input {
            flex: 1;
        }
        .join-row .btn {
            width: auto;
            padding: 14px 20px;
            white-space: nowrap;
        }
        .error {
            background: rgba(255,0,0,0.15);
            color: #ff6b6b;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 14px;
            margin-top: 12px;
            display: none;
        }
        .error.show { display: block; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎵 音乐狼人杀</h1>
    <p class="subtitle">听歌找出卧底</p>

    <div id="error" class="error"></div>

    <!-- 创建房间 -->
    <div class="form-group">
        <label>👤 你的昵称</label>
        <input type="text" id="hostName" placeholder="输入昵称" value="玩家">
    </div>
    <button class="btn btn-primary" onclick="createRoom()">🏠 创建房间</button>

    <div class="divider">或</div>

    <!-- 加入房间 -->
    <div class="form-group">
        <label>🔑 房间号</label>
        <div class="join-row">
            <input type="text" id="roomId" placeholder="输入6位房间号" maxlength="6">
            <button class="btn btn-primary" onclick="joinRoom()">加入</button>
        </div>
    </div>
    <div class="form-group">
        <label>👤 你的昵称</label>
        <input type="text" id="playerName" placeholder="输入昵称" value="玩家">
    </div>
</div>

<script>
    // API 地址
    const API_BASE = '/api/room';

    function showError(msg) {
        const el = document.getElementById('error');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 3000);
    }

    function createRoom() {
        const name = document.getElementById('hostName').value.trim();
        if (!name) { showError('请输入昵称'); return; }

        fetch(API_BASE + '/create?hostName=' + encodeURIComponent(name), {
            method: 'POST'
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                window.location.href = '/lobby/' + data.roomId + '?playerName=' + encodeURIComponent(name);
            } else {
                showError(data.message || '创建失败');
            }
        })
        .catch(() => showError('服务器连接失败，请确认项目已启动'));
    }

    function joinRoom() {
        const roomId = document.getElementById('roomId').value.trim();
        const name = document.getElementById('playerName').value.trim();
        if (!roomId) { showError('请输入房间号'); return; }
        if (!name) { showError('请输入昵称'); return; }
        if (roomId.length !== 6) { showError('房间号是6位数字'); return; }

        fetch(API_BASE + '/join?roomId=' + roomId + '&playerName=' + encodeURIComponent(name), {
            method: 'POST'
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                window.location.href = '/lobby/' + roomId + '?playerName=' + encodeURIComponent(name);
            } else {
                showError(data.message || '加入失败');
            }
        })
        .catch(() => showError('服务器连接失败，请确认项目已启动'));
    }

    // 回车键快捷操作
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const active = document.activeElement;
            if (active.id === 'hostName') createRoom();
            else if (active.id === 'roomId' || active.id === 'playerName') joinRoom();
        }
    });
</script>
</body>
</html>
