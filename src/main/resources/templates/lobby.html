<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>等待大厅 - 🎵 音乐狼人杀</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            text-align: center;
            color: #fff;
            font-size: 24px;
            margin-bottom: 4px;
        }
        .room-id {
            text-align: center;
            color: #6c63ff;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 4px;
            margin: 10px 0 20px;
        }
        .room-id-label {
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
        }
        .players {
            margin: 20px 0;
        }
        .players-title {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            margin-bottom: 10px;
        }
        .player-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            margin-bottom: 8px;
            color: #fff;
            font-size: 16px;
        }
        .player-item .icon {
            margin-right: 12px;
        }
        .player-item .host-badge {
            margin-left: auto;
            background: #6c63ff;
            color: #fff;
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 20px;
        }
        .player-item .count {
            margin-left: auto;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
        }
        .player-count {
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 13px;
            margin: 16px 0;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary {
            background: #6c63ff;
            color: #fff;
        }
        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            margin-top: 10px;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); }
        .status {
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            margin: 12px 0;
        }
        .copy-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            margin-left: 8px;
        }
        .copy-btn:hover { background: rgba(255,255,255,0.15); }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎵 等待大厅</h1>
    <div class="room-id-label">房间号</div>
    <div class="room-id" id="roomIdDisplay">------</div>

    <div class="players">
        <div class="players-title">👥 玩家 (<span id="playerCount">0</span>/4)</div>
        <div id="playerList">
            <!-- 由 JavaScript 动态渲染 -->
        </div>
    </div>

    <div class="player-count" id="statusMessage">等待更多玩家加入...</div>

    <button class="btn btn-primary" id="startBtn" onclick="startGame()">🎮 开始游戏</button>
    <button class="btn btn-secondary" onclick="copyRoomId()">📋 复制房间号</button>
    <button class="btn btn-secondary" id="returnLobbyBtn" onclick="window.location.href='/'">🏠 返回大厅</button>
</div>

<div class="toast" id="toast"></div>

<script>
    // 从 URL 获取参数
    const urlParams = new URLSearchParams(window.location.search);
    const playerName = urlParams.get('playerName') || '玩家';
    const roomId = window.location.pathname.split('/')[2];
    const API_BASE = 'http://localhost:8080/api/room';

    let isHost = false;

    function showToast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 2500);
    }

    function renderPlayers(players, hostName) {
        const list = document.getElementById('playerList');
        const count = document.getElementById('playerCount');
        count.textContent = players.length;

        if (players.length === 0) {
            list.innerHTML = '<div style="color:rgba(255,255,255,0.2);text-align:center;padding:20px;font-size:14px;">暂无玩家</div>';
            return;
        }

        list.innerHTML = players.map(p => {
            const isHostPlayer = p.name === hostName;
            const isMe = p.name === playerName;
            return `
                <div class="player-item">
                    <span class="icon">${isMe ? '⭐' : '👤'}</span>
                    ${p.name}
                    ${isHostPlayer ? '<span class="host-badge">房主</span>' : ''}
                    ${isMe ? '<span style="margin-left:8px;color:rgba(255,255,255,0.3);font-size:12px;">(我)</span>' : ''}
                </div>
            `;
        }).join('');
    }

    function updateRoomInfo() {
        fetch(API_BASE + '/info/' + roomId)
            .then(res => res.json())
            .then(data => {
                if (!data.success) {
                    showToast('房间不存在，即将跳转...');
                    setTimeout(() => window.location.href = '/', 1500);
                    return;
                }

                const room = data.data;
                document.getElementById('roomIdDisplay').textContent = room.roomId;
                renderPlayers(room.players, room.hostName);

                // 判断当前用户是否是房主
                isHost = room.hostName === playerName;

                const startBtn = document.getElementById('startBtn');
                const statusMsg = document.getElementById('statusMessage');

                if (room.state === 'PLAYING') {
                    startBtn.disabled = true;
                    startBtn.textContent = '⏳ 游戏进行中...';
                    statusMsg.textContent = '游戏已开始！';
                    // 跳转到游戏页面
                    setTimeout(() => {
                        window.location.href = '/game/' + roomId + '/' + encodeURIComponent(playerName);
                    }, 1500);
                    return;
                }
                // 控制返回大厅按钮的显示
                const returnLobbyBtn = document.getElementById('returnLobbyBtn');
                if (room.state === 'PLAYING') {
                    returnLobbyBtn.style.display = 'none';
                } else {
                    returnLobbyBtn.style.display = 'block';
                }

                if (isHost) {
                    startBtn.disabled = false;
                    startBtn.textContent = '🎮 开始游戏';
                    if (room.players.length < 3) {
                        startBtn.disabled = true;
                        startBtn.textContent = `需要 ${3 - room.players.length} 人 才能开始`;
                    }
                    statusMsg.textContent = '你是房主，点击开始游戏！';
                } else {
                    startBtn.disabled = true;
                    startBtn.textContent = '⏳ 等待房主开始...';
                    statusMsg.textContent = `等待房主 (${room.hostName}) 开始游戏...`;
                }
            })
            .catch(() => {
                showToast('服务器连接失败，请确认项目已启动');
            });
    }

    function startGame() {
        if (!isHost) return;
        fetch(API_BASE + '/start/' + roomId, { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    showToast('🎮 游戏开始！');
                    setTimeout(() => {
                        window.location.href = '/game/' + roomId + '/' + encodeURIComponent(playerName);
                    }, 1000);
                } else {
                    showToast(data.message || '开始失败');
                }
            })
            .catch(() => showToast('服务器连接失败'));
    }

    function copyRoomId() {
        const id = document.getElementById('roomIdDisplay').textContent;
        if (navigator.clipboard) {
            navigator.clipboard.writeText(id)
                .then(() => showToast('✅ 房间号已复制：' + id))
                .catch(() => fallbackCopy(id));
        } else {
            fallbackCopy(id);
        }
    }

    function fallbackCopy(text) {
        const input = document.createElement('input');
        input.value = text;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        showToast('✅ 房间号已复制：' + text);
    }

    // 每3秒刷新一次房间信息
    updateRoomInfo();
    setInterval(updateRoomInfo, 3000);
</script>
</body>
</html>
